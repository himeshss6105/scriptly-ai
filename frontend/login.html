<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Scriptly.AI</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-field"></div>
  <div class="bg-grid"></div>

  <div class="auth-wrap">
    <form class="glass auth-card" id="login-form">
      <a href="index.html" class="brand"><span class="brand-mark"></span>Scriptly.AI</a>
      <p class="auth-sub">Welcome back. The Core remembers you.</p>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
        <div class="field-error" id="password-error">Enter your password.</div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="login-btn">Log in</button>
      <div class="form-msg" id="login-msg"></div>

      <p class="auth-foot">No console yet? <a href="signup.html">Create one</a></p>
    </form>
  </div>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
